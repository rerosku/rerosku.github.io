# Site settings
title: "Rerosku"
email: rerosku@gmail.com
description: "Benvenutǝ nel mio spazio personale sul web"
url: "https://rerosku.github.io"
baseurl: ""

# Author settings
author:
  name: "Alessandro Nardi"
  bio: "Alchemical Coach e Reikista, appassionato di tecnologia e spiritualità"
  avatar: "/assets/images/avatar.jpg"
  location: "Italia"
  social:
    instagram: "https://instagram.com/rerosku"
    bluesky: "https://bsky.app/profile/rerosku.bsky.social"
    github: "https://github.com/rerosku"

# Collections
collections:
  pages:
    output: true
    permalink: /:name/

# Pagination (GitHub Pages compatible)
paginate: 5
paginate_path: "/page:num/"

# Build settings
markdown: kramdown
highlighter: rouge
theme: null
plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-paginate

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - .bundle
  - .sass-cache
  - .jekyll-cache
  - .jekyll-metadata
  - README.md
  - LICENSE

# Sass (disabilitato per CSS inline)
sass:
  style: compressed

# Timezone
timezone: Europe/Rome

# Liquid
liquid:
  error_mode: warn