---
layout: default
---
<article class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-20">
  <header class="mb-12 reveal">
    <div class="flex items-center gap-3 mb-4">
      <span class="px-3 py-1 bg-salvia-100 text-salvia-600 text-xs font-medium rounded-full uppercase tracking-wide">{{
        page.categories | first }}</span>
      <span class="text-sm text-salvia-400">{{ page.date | date: "%d %B %Y" }}</span>
      <span class="text-sm text-salvia-400">· {{ page.read_time | default: "5" }} min di lettura</span>
    </div>
    <h1 class="font-display text-4xl lg:text-5xl font-light text-salvia-800 leading-tight">{{ page.title }}</h1>
    {% if page.excerpt %}
    <p class="mt-4 text-lg text-salvia-500 italic">{{ page.excerpt | strip_html }}</p>
    {% endif %}
  </header>

  <div class="prose prose-lg prose-salvia max-w-none reveal">
    {{ content }}
  </div>

  <footer class="mt-16 pt-8 border-t border-salvia-200 reveal">
    <a href="/blog/" class="inline-flex items-center gap-2 text-salvia-600 hover:text-salvia-800 transition-colors">
      <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
      </svg>
      Torna al Blog
    </a>
  </footer>
</article>
